name: Sky Watch
on:
  schedule:
    - cron: "54 * * * *"
  workflow_dispatch:
permissions: {}
concurrency:
  group: sky-watch
  cancel-in-progress: false
jobs:
  sky-watch:
    name: Sky Watch
    runs-on: ubuntu-latest
    steps:
      - name: Create token
        id: create-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.APPLICATION_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: thatskyapplication
          repositories: sky-watch
          permission-contents: write

      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ steps.create-token.outputs.token }}
          ref: ${{ github.ref_name }}

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Check endpoints
        run: node source/index.ts
        env:
          INPUT_DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          INPUT_SKY_BUILD_ACCESS_KEY: ${{ secrets.SKY_BUILD_ACCESS_KEY }}
          INPUT_SKY_USER_AGENT: ${{ secrets.SKY_USER_AGENT }}

      - name: Commit snapshot changes
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          git config user.name thatskyapplication[bot]
          git config user.email "${{ vars.APPLICATION_USER_ID }}+thatskyapplication[bot]@users.noreply.github.com"
          mkdir -p snapshots
          git add snapshots

          if git diff --cached --quiet; then
            echo "::notice::No snapshot changes to commit."
            exit 0
          fi

          git commit --message "chore: update snapshots"
          git push origin "HEAD:$REF_NAME"
